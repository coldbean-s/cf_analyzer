services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev}
      POSTGRES_DB: cf_analyzer
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  app:
    build: .
    restart: unless-stopped
    depends_on:
      - postgres
    ports:
      - "6010:6010"
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:-dev}@postgres:5432/cf_analyzer
      CF_HEADLESS: "true"
    volumes:
      - ./data:/app/data  # Persist CF browser profiles

volumes:
  pgdata:
